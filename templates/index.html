<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Window and Door Production Floor Bottleneck Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue-50: #eef4ff;
      --blue-100: #dbe7ff;
      --blue-400: #4d8bff;
      --blue-500: #2f6fed;
      --blue-600: #2356c9;
      --blue-700: #1c439e;
      --blue-900: #0c1f4d;
      --red-500: #e5484d;
      --red-600: #c93a3e;
      --gray-50: #f8fafc;
      --gray-200: #e6e9ef;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #0c1018;
      --shadow-sm: 0 1px 2px rgba(16, 42, 99, 0.06);
      --shadow-md: 0 10px 30px rgba(16, 42, 99, 0.12);
      --shadow-lg: 0 24px 60px rgba(16, 42, 99, 0.20);
      --ease-spring: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
    }

    body {
      background: #f7f9fc;
      color: var(--gray-900);
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      position: relative;
    }

    /* ---------- animated mesh background ---------- */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .bg-mesh span {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.55;
      animation: drift 22s ease-in-out infinite;
    }

    .bg-mesh span:nth-child(1) {
      width: 520px; height: 520px;
      background: radial-gradient(circle, var(--blue-400), transparent 70%);
      top: -10%; left: -8%;
      animation-duration: 26s;
    }

    .bg-mesh span:nth-child(2) {
      width: 460px; height: 460px;
      background: radial-gradient(circle, var(--red-500), transparent 70%);
      top: 30%; right: -10%;
      opacity: 0.28;
      animation-duration: 30s;
      animation-delay: -6s;
    }

    .bg-mesh span:nth-child(3) {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--blue-600), transparent 72%);
      bottom: -18%; left: 18%;
      opacity: 0.3;
      animation-duration: 34s;
      animation-delay: -12s;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.08); }
      66% { transform: translate(-30px, 25px) scale(0.95); }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg-mesh span { animation: none; }
    }

    /* ---------- sticky glass nav ---------- */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border-bottom: 1px solid rgba(16, 42, 99, 0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 15px;
      color: var(--blue-900);
      letter-spacing: -0.01em;
    }

    /* ---------- main layout: full screen ---------- */
    main {
      min-height: calc(100vh - 68px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 48px 80px;
      width: 100%;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      max-width: 760px;
      animation: fadeInDown 0.6s var(--ease-spring) both;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--blue-100);
      color: var(--blue-700);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    .eyebrow .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--blue-500);
      box-shadow: 0 0 0 3px var(--blue-100);
    }

    header h1 {
      font-size: clamp(34px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.08;
      background: linear-gradient(120deg, var(--blue-900), var(--blue-600) 55%, var(--blue-400));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    header p {
      font-size: 16px;
      color: var(--gray-500);
      margin-top: 14px;
      font-weight: 500;
    }

    /* ---------- button grid, full width ---------- */
    #button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1280px;
      flex: 1;
    }

    #button-grid.hidden {
      display: none;
    }

    .op-button {
      --mx: 50%;
      --my: 50%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 16px;
      text-align: left;
      background: linear-gradient(155deg, var(--blue-500), var(--blue-600));
      color: #ffffff;
      border: none;
      border-radius: 18px;
      padding: 26px 24px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform 0.35s var(--ease-spring), box-shadow 0.35s var(--ease-spring);
      opacity: 0;
      transform: translateY(14px);
      animation: fadeInUp 0.5s var(--ease-spring) forwards;
      will-change: transform;
    }

    .op-button .glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle 140px at var(--mx) var(--my), rgba(255,255,255,0.35), transparent 70%);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .op-button:hover .glow {
      opacity: 1;
    }

    .op-button .badge {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      transition: transform 0.3s var(--ease-spring);
    }

    .op-button .label small {
      display: block;
      font-weight: 600;
      font-size: 11.5px;
      opacity: 0.85;
      margin-bottom: 3px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .op-button .arrow {
      margin-left: auto;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.25s ease, transform 0.25s var(--ease-spring);
      font-size: 18px;
    }

    .op-button:hover {
      transform: translateY(-6px) scale(1.015);
      box-shadow: var(--shadow-lg);
    }

    .op-button:hover .badge {
      transform: rotate(-8deg) scale(1.08);
    }

    .op-button:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    .op-button:active {
      transform: translateY(-2px) scale(0.985);
    }

    .op-button.top-button {
      background: linear-gradient(155deg, var(--red-500), var(--red-600));
      grid-column: 1 / -1;
      justify-content: center;
      text-align: center;
      font-size: 17px;
      padding: 28px;
    }

    .op-button.top-button .badge {
      background: rgba(255, 255, 255, 0.22);
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.97) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ---------- detail panel ---------- */
    #detail-panel {
      display: none;
      width: 100%;
      max-width: 1280px;
      margin-top: 4px;
      flex: 1;
    }

    #detail-panel.visible {
      display: block;
      animation: scaleIn 0.45s var(--ease-spring) both;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #ffffff;
      color: var(--gray-700);
      border: 1px solid var(--gray-200);
      border-radius: 11px;
      padding: 10px 18px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 26px;
      transition: background 0.2s ease, transform 0.2s var(--ease-spring), border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .back-button:hover {
      background: var(--gray-50);
      border-color: var(--blue-500);
      color: var(--blue-700);
      transform: translateX(-3px);
      box-shadow: var(--shadow-sm);
    }

    .detail-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--gray-200);
      border-radius: 22px;
      padding: 40px;
      box-shadow: var(--shadow-md);
    }

    .detail-card h2 {
      color: var(--blue-900);
      margin-bottom: 26px;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.015em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .detail-card h2::before {
      content: '';
      width: 9px;
      height: 26px;
      border-radius: 5px;
      background: linear-gradient(180deg, var(--blue-500), var(--blue-700));
      display: inline-block;
    }

    .detail-card ul {
      list-style: none;
    }

    .detail-card li {
      position: relative;
      padding: 18px 18px 18px 44px;
      margin-bottom: 12px;
      line-height: 1.65;
      color: var(--gray-700);
      background: var(--gray-50);
      border: 1px solid transparent;
      border-radius: 12px;
      opacity: 0;
      transform: translateX(-10px);
      animation: slideInLeft 0.45s var(--ease-spring) forwards;
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }

    .detail-card li:hover {
      border-color: var(--blue-100);
      background: var(--blue-50);
      transform: translateX(2px);
    }

    @keyframes slideInLeft {
      to { opacity: 1; transform: translateX(0); }
    }

    .detail-card li::before {
      content: '';
      position: absolute;
      left: 16px;
      top: 22px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue-500);
      box-shadow: 0 0 0 4px var(--blue-100);
    }

    .top-item {
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: 22px;
      margin-bottom: 22px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.45s var(--ease-spring) forwards;
    }

    .top-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .top-item .rank-line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      font-weight: 700;
      color: var(--blue-900);
      margin-bottom: 9px;
      font-size: 16px;
    }

    .top-item .delay-tag {
      display: inline-block;
      background: linear-gradient(135deg, var(--red-500), var(--red-600));
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 999px;
    }

    .top-item div:last-child {
      color: var(--gray-700);
      line-height: 1.65;
    }

    footer {
      text-align: center;
      padding: 28px 0 0;
      font-size: 12.5px;
      color: var(--gray-500);
    }

    @media (max-width: 600px) {
      .topnav { padding: 16px 20px; }
      main { padding: 40px 20px 60px; }
      .detail-card { padding: 26px; }
    }
  </style>
</head>
<body>

<div class="bg-mesh"><span></span><span></span><span></span></div>

<nav class="topnav">
  <div class="brand">Production Floor</div>
</nav>

<main>
  <header>
    <span class="eyebrow"><span class="dot"></span>Production Floor Insights</span>
    <h1>Window and Door Production Floor</h1>
    <p>Select an operation to view its bottleneck reasons</p>
  </header>

  <div id="button-grid">
    <button class="op-button top-button" id="top-bottlenecks-btn">
      <span class="glow"></span>
      <span class="badge">&#9650;</span>
      <span class="label">Top Bottlenecks</span>
      <span class="arrow">&rarr;</span>
    </button>
  </div>

  <div id="detail-panel">
    <button class="back-button" id="back-btn">&larr; Back to Operations</button>
    <div class="detail-card" id="detail-content"></div>
  </div>

  <footer>Window &amp; Door Manufacturing &mdash; Internal Bottleneck Reference</footer>
</main>

<script>
  const buttonGrid = document.getElementById('button-grid');
  const detailPanel = document.getElementById('detail-panel');
  const detailContent = document.getElementById('detail-content');
  const backBtn = document.getElementById('back-btn');
  const topBtn = document.getElementById('top-bottlenecks-btn');

  function attachTilt(btn) {
    btn.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      btn.style.setProperty('--mx', `${x}px`);
      btn.style.setProperty('--my', `${y}px`);
    });
  }

  function staggerChildren(selector, container) {
    container.querySelectorAll(selector).forEach((el, i) => {
      el.style.animationDelay = `${i * 70}ms`;
    });
  }

  function showDetail(html) {
    detailContent.innerHTML = html;
    buttonGrid.classList.add('hidden');
    detailPanel.classList.remove('visible');
    void detailPanel.offsetWidth;
    detailPanel.classList.add('visible');
    staggerChildren('li, .top-item', detailContent);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showGrid() {
    buttonGrid.classList.remove('hidden');
    detailPanel.classList.remove('visible');
  }

  async function loadOperations() {
    const res = await fetch('/api/operations');
    const operations = await res.json();
    operations.forEach((op, i) => {
      const btn = document.createElement('button');
      btn.className = 'op-button';
      btn.style.animationDelay = `${(i + 1) * 70}ms`;
      btn.innerHTML = `
        <span class="glow"></span>
        <span class="badge">${op.id}</span>
        <span class="label"><small>Operation #${op.id}</small>${op.name}</span>
        <span class="arrow">&rarr;</span>
      `;
      btn.addEventListener('click', () => loadOperationDetail(op.id));
      attachTilt(btn);
      buttonGrid.appendChild(btn);
    });
  }

  async function loadOperationDetail(opId) {
    const res = await fetch(`/api/operations/${opId}`);
    const op = await res.json();
    const bullets = op.bullets.map(b => `<li>${b}</li>`).join('');
    showDetail(`<h2>Operation #${op.id}: ${op.name}</h2><ul>${bullets}</ul>`);
  }

  async function loadTopBottlenecks() {
    const res = await fetch('/api/top-bottlenecks');
    const items = await res.json();
    const html = items.map(item => `
      <div class="top-item">
        <div class="rank-line">${item.rank}. ${item.operation}<span class="delay-tag">${item.delay}</span></div>
        <div>${item.description}</div>
      </div>
    `).join('');
    showDetail(`<h2>Top Bottlenecks — Ranked by Production Time Impact and Frequency</h2>${html}`);
  }

  attachTilt(topBtn);
  topBtn.addEventListener('click', loadTopBottlenecks);
  backBtn.addEventListener('click', showGrid);

  loadOperations();
</script>

</body>
</html>
