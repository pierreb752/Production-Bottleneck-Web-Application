<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Window and Door Production Floor Bottleneck Terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 24px;
      color: #0d3b8c;
    }

    header p {
      font-size: 14px;
      color: #555;
      margin-top: 6px;
    }

    #button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
    }

    .op-button {
      background: #1565c0;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 18px 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    .op-button:hover {
      background: #0d47a1;
      transform: translateY(-1px);
    }

    .op-button.top-button {
      background: #c62828;
      grid-column: 1 / -1;
    }

    .op-button.top-button:hover {
      background: #8e0000;
    }

    #detail-panel {
      display: none;
      width: 100%;
      max-width: 900px;
      margin-top: 8px;
    }

    #detail-panel.visible {
      display: block;
    }

    #button-grid.hidden {
      display: none;
    }

    .back-button {
      background: #eeeeee;
      color: #1a1a1a;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .back-button:hover {
      background: #ddd;
    }

    .detail-card {
      background: #f5f8ff;
      border: 1px solid #c9dafc;
      border-radius: 10px;
      padding: 24px;
    }

    .detail-card h2 {
      color: #0d3b8c;
      margin-bottom: 16px;
      font-size: 20px;
    }

    .detail-card ul {
      list-style: none;
    }

    .detail-card li {
      position: relative;
      padding-left: 22px;
      margin-bottom: 14px;
      line-height: 1.6;
      color: #2a2a2a;
    }

    .detail-card li::before {
      content: '•';
      position: absolute;
      left: 4px;
      color: #1565c0;
      font-weight: bold;
    }

    .top-item {
      border-bottom: 1px solid #c9dafc;
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .top-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .top-item .rank-line {
      font-weight: 700;
      color: #0d3b8c;
      margin-bottom: 4px;
    }

    .top-item .delay-tag {
      display: inline-block;
      background: #c62828;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>Window and Door Production Floor</h1>
  <p>Select an operation to view its bottleneck reasons</p>
</header>

<div id="button-grid">
  <button class="op-button top-button" id="top-bottlenecks-btn">Top Bottlenecks</button>
</div>

<div id="detail-panel">
  <button class="back-button" id="back-btn">&larr; Back to Operations</button>
  <div class="detail-card" id="detail-content"></div>
</div>

<script>
  const buttonGrid = document.getElementById('button-grid');
  const detailPanel = document.getElementById('detail-panel');
  const detailContent = document.getElementById('detail-content');
  const backBtn = document.getElementById('back-btn');
  const topBtn = document.getElementById('top-bottlenecks-btn');

  function showDetail(html) {
    detailContent.innerHTML = html;
    buttonGrid.classList.add('hidden');
    detailPanel.classList.add('visible');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showGrid() {
    buttonGrid.classList.remove('hidden');
    detailPanel.classList.remove('visible');
  }

  async function loadOperations() {
    const res = await fetch('/api/operations');
    const operations = await res.json();
    operations.forEach(op => {
      const btn = document.createElement('button');
      btn.className = 'op-button';
      btn.textContent = `Operation #${op.id}: ${op.name}`;
      btn.addEventListener('click', () => loadOperationDetail(op.id));
      buttonGrid.appendChild(btn);
    });
  }

  async function loadOperationDetail(opId) {
    const res = await fetch(`/api/operations/${opId}`);
    const op = await res.json();
    const bullets = op.bullets.map(b => `<li>${b}</li>`).join('');
    showDetail(`<h2>Operation #${op.id}: ${op.name}</h2><ul>${bullets}</ul>`);
  }

  async function loadTopBottlenecks() {
    const res = await fetch('/api/top-bottlenecks');
    const items = await res.json();
    const html = items.map(item => `
      <div class="top-item">
        <div class="rank-line">#${item.rank} ${item.operation}<span class="delay-tag">${item.delay}</span></div>
        <div>${item.description}</div>
      </div>
    `).join('');
    showDetail(`<h2>Top Bottlenecks — Ranked by Production Time Impact and Frequency</h2>${html}`);
  }

  topBtn.addEventListener('click', loadTopBottlenecks);
  backBtn.addEventListener('click', showGrid);

  loadOperations();
</script>

</body>
</html>
